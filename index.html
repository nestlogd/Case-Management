<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個案管理紀錄智慧生成器</title>
    <style>
        :root {
            --bg-color: #f2f0eb; --card-bg: #fafaf8; --text-main: #3d3b38;
            --accent: #7a6e5d; --border: #d6d0c6; --input-focus: #a89d8d;
            --font-size: 1.2rem;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 30px 20px; margin: 0; line-height: 1.8; font-size: var(--font-size); }
        .container { max-width: 1000px; margin: 0 auto; }
        .section { background: var(--card-bg); padding: 35px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid var(--border); }
        h2 { font-size: 1.5rem; color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-top: 0; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 700; margin-bottom: 10px; color: #5a5752; }
        input[type="text"], select, textarea, input[type="date"] { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1.15rem; background: #fff; box-sizing: border-box; color: var(--text-main); }
        details { background: #fff; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
        summary { padding: 12px 15px; font-weight: bold; cursor: pointer; background: #efece7; border-radius: 10px; list-style: none; display: flex; justify-content: space-between; }
        summary::after { content: "▼"; font-size: 0.8rem; }
        details[open] summary::after { content: "▲"; }
        .choice-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding: 15px; }
        .choice-item { display: flex; align-items: center; cursor: pointer; font-size: 1.1rem; }
        .choice-item input { width: 22px; height: 22px; margin-right: 10px; }
        #dynamic-treatment-area { background: #fdfaf5; border: 2px solid #e2dcd3; padding: 25px; border-radius: 15px; margin-top: 15px; }
        .btn-main { display: block; width: 100%; background: var(--accent); color: white; border: none; padding: 18px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.3s; margin: 40px 0; }
        #resultArea { display: none; background: #fff; border: 3px solid var(--accent); padding: 40px; border-radius: 20px; white-space: pre-wrap; font-size: 1.25rem; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .copy-btn { position: absolute; top: 15px; right: 15px; padding: 10px 20px; background: #8e8e8e; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .row { display: flex; gap: 15px; align-items: center; }
        .child-select-group { display: flex; gap: 20px; margin-top: 10px; background: #f4f2ee; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--accent); font-size: 2.2rem; margin-bottom: 40px;">個案管理紀錄智慧生成系統</h1>

    <div class="section" style="border: 2px solid var(--accent);">
        <h2>◆ 步驟 1：選擇專案計畫</h2>
        <div class="form-group">
            <label>專案計畫分類</label>
            <select id="plan_type">
                <option value="婦女再就業計畫">婦女再就業計畫</option>
                <option value="弱勢勞工協助措施">弱勢勞工協助措施</option>
                <option value="青年職得好評計畫">青年職得好評計畫</option>
                <option value="外台青年職得好評">外台推介青年職得好評計畫</option>
                <option value="缺工就業獎勵">缺工就業獎勵</option>
                <option value="職學_一般">職學 (一般推介)</option>
                <option value="職學_卡">職學 (開介紹卡)</option>
                <option value="僱獎_一般">僱獎 (一般推介)</option>
                <option value="僱獎_卡">僱獎 (開介紹卡)</option>
                <option value="就保跨域_一般">就保跨域 (一般推介)</option>
                <option value="就保跨域_卡">就保跨域 (開介紹卡)</option>
                <option value="初青跨域_一般">初青跨域 (一般推介)</option>
                <option value="初青跨域_卡">初青跨域 (開介紹卡)</option>
            </select>
        </div>
        <div id="dynamic-treatment-area">
            <div id="treatment_inputs"></div>
        </div>
    </div>

    <div class="section">
        <h2>◆ 步驟 2：背景資料</h2>
        <div class="form-group">
            <label>家族史狀況</label>
            <div class="row" style="background:#efece7; padding:15px; border-radius:12px;">
                <label class="choice-item"><input type="radio" name="family_status" value="單身"> 單身自住</label>
                <label class="choice-item"><input type="radio" name="family_status" value="同住" checked> 有同住家庭成員</label>
            </div>
            <div id="family_detail_area" style="margin-top: 20px;">
                <label>選擇成人成員</label>
                <div class="row" style="flex-wrap: wrap; gap: 10px;" id="adult_check_row">
                    <label class="choice-item"><input type="checkbox" value="配偶">配偶</label>
                    <label class="choice-item"><input type="checkbox" value="爸爸">爸爸</label>
                    <label class="choice-item"><input type="checkbox" value="媽媽">媽媽</label>
                </div>
                
                <div class="child-select-group">
                    <div style="flex: 1;">
                        <label>兒子數量</label>
                        <select id="son_count">
                            <option value="0">0 位</option><option value="1">1 位</option><option value="2">2 位</option><option value="3">3 位</option><option value="4">4 位</option><option value="5">5 位</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>女兒數量</label>
                        <select id="daughter_count">
                            <option value="0">0 位</option><option value="1">1 位</option><option value="2">2 位</option><option value="3">3 位</option><option value="4">4 位</option><option value="5">5 位</option>
                        </select>
                    </div>
                </div>
                <div id="member_job_list" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            </div>
        </div>
        <div class="form-group">
            <label>教育史 (多所學校請以 , 分開)</label>
            <input type="text" id="edu_history" placeholder="例如：大學-台大電機畢業, 碩士-彰師大心理畢業">
        </div>
        <div class="grid">
            <div class="form-group"><label>健康史</label>
                <select id="health_status"><option value="無">無狀況</option><option value="有">有狀況</option></select>
                <input type="text" id="health_custom" style="display:none; margin-top:10px;" placeholder="病名或障別">
            </div>
            <div class="form-group"><label>興趣</label><input type="text" id="interest" placeholder="留空則顯示：沒有明確的興趣喜好"></div>
        </div>
        <div class="grid">
            <div class="form-group"><label>經驗職稱</label><input type="text" id="exp_job" placeholder="例如：餐廳外場服務員"></div>
            <div class="form-group"><label>累計資歷</label>
                <div class="row"><input type="text" id="exp_y" placeholder="年" list="y_list" style="width:80px;"><select id="exp_m"></select></div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>◆ 步驟 3：技巧(專長) 與 工作職能</h2>
        <div class="form-group"><label>1. 具備駕照</label>
            <div class="row" style="background:#efece7; padding:15px; border-radius:12px;">
                <label class="choice-item"><input type="checkbox" name="skill_lic" value="重型機車駕照">重型機車駕照</label>
                <label class="choice-item"><input type="checkbox" name="skill_lic" value="普通小型車駕照">普通小型車駕照</label>
                <input type="text" id="skill_lic_custom" placeholder="其他駕照自填" style="width:200px;">
            </div>
        </div>
        <label>2. 具備證照</label>
        <details><summary>照顧醫療相關</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="照顧服務員單一級技術士技能檢定">照顧服務員單一級技術士技能檢定</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="長照服務人員證明">長照服務人員證明</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="居家服務員訓練結業證明">居家服務員訓練結業證明</label>
        </div></details>
        <details><summary>行政電腦</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="TQC電腦證照">TQC電腦證照</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="MOS（Word / Excel / PowerPoint）">MOS（Word / Excel / PowerPoint）</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級電腦軟體應用技術士">丙級電腦軟體應用技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級電腦軟體應用技術士">乙級電腦軟體應用技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="中文輸入">中文輸入</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="英文輸入">英文輸入</label>
        </div></details>
        <details><summary>商業會計</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級會計事務技術士">丙級會計事務技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級會計事務技術士">乙級會計事務技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="記帳士">記帳士</label>
        </div></details>
        <details><summary>餐飲食品</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級中餐烹調技術士">丙級中餐烹調技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級中餐烹調技術士">乙級中餐烹調技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級烘焙技術士">丙級烘焙技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級烘焙技術士">乙級烘焙技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="食品衛生安全講習證明">食品衛生安全講習證明</label>
        </div></details>
        <details><summary>技術勞務類</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級職業安全衛生管理員">乙級職業安全衛生管理員</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級工業配線技術士">丙級工業配線技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級電腦硬體裝修技術士">丙級電腦硬體裝修技術士</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="堆高機操作證">堆高機操作證</label>
        </div></details>
        <input type="text" id="skill_cert_custom" placeholder="其他證照自填" style="margin-bottom:20px;">
        
        <label>3. 具備工作職能</label>
        <details><summary>行政文書</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="電腦文書處理能力">電腦文書處理能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="資料輸入與建檔能力">資料輸入與建檔能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="文件整理與歸檔">文件整理與歸檔</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="基本文書處理（Word、Excel）">基本文書處理（Word、Excel）</label>
        </div></details>
        <details><summary>行政進階</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="行政事務處理能力">行政事務處理能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="櫃檯接待與應對能力">櫃檯接待與應對能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="電話應對與溝通能力">電話應對與溝通能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="行程安排與協調能力">行程安排與協調能力</label>
        </div></details>
        <details><summary>服務業</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="顧客服務接待能力">顧客服務接待能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="客訴處理能力">客訴處理能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="門市銷售與商品介紹能力">門市銷售與商品介紹能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="收銀操作能力">收銀操作能力</label>
        </div></details>
        <details><summary>勞務作業</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="體力勞動工作能力">體力勞動工作能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="簡易機械操作能力">簡易機械操作能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="包裝作業能力">包裝作業能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="倉儲整理能力">倉儲整理能力</label>
        </div></details>
        <details><summary>軟實力</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="具備良好溝通能力">具備良好溝通能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="工作態度積極負責">工作態度積極負責</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="配合度高">配合度高</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="抗壓性佳">抗壓性佳</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="願意學習新技能">願意學習新技能</label>
        </div></details>
        <input type="text" id="skill_fun_custom" placeholder="其他職能自填">
    </div>

    <div class="section">
        <h2>◆ 步驟 4：工作目標與本次待業</h2>
        <div class="grid">
            <div class="form-group"><label>1. 工作類型</label><input type="text" id="target_job"></div>
            <div class="form-group"><label>2. 工作地點</label><input type="text" id="target_loc"></div>
            <div class="form-group"><label>3. 交通時間 (分)</label><input type="text" id="target_commute"></div>
            <div class="form-group"><label>4. 希望待遇</label><input type="text" id="target_salary"></div>
        </div>
        <div class="form-group">
            <label>5. 工作時間</label>
            <div class="row" style="background:#efece7; padding:15px; border-radius:12px;">
                <label class="choice-item"><input type="checkbox" name="target_shift" value="日班" checked>日班</label>
                <label class="choice-item"><input type="checkbox" name="target_shift" value="中班">中班</label>
                <label class="choice-item"><input type="checkbox" name="target_shift" value="晚班">晚班</label>
                <label class="choice-item"><input type="checkbox" name="target_shift" value="可輪班">可輪班</label>
                <input type="text" id="target_shift_custom" placeholder="自填" style="width:150px;">
            </div>
        </div>
        <div class="form-group"><label>待業時間 (本次長度)</label>
            <div class="row"><input type="text" id="idle_y" placeholder="年" list="y_list" style="width:80px;"><select id="idle_m"></select></div>
        </div>
    </div>

    <div class="section">
        <h2>◆ 步驟 5：補助狀況與運用計畫</h2>
        <div class="form-group"><label>申請補助狀況</label>
            <div class="row" style="flex-wrap: wrap; gap:10px;">
                <label class="choice-item"><input type="checkbox" name="other_subs" value="申請失業給付">申請失業給付</label>
                <label class="choice-item"><input type="checkbox" name="other_subs" value="弱勢勞工生活扶助">弱勢勞工生活扶助</label>
            </div>
        </div>
        <div class="form-group"><label>目前運用求職計畫</label>
            <select id="other_plan">
                <option value="無">無</option>
                <option value="婦女再就業計畫">婦女再就業計畫</option>
                <option value="弱勢勞工協助措施">弱勢勞工協助措施</option>
                <option value="青年職得好評計畫">青年職得好評計畫</option>
                <option value="缺工就業獎勵">缺工就業獎勵</option>
                <option value="職場學習及再適應計畫">職場學習及再適應計畫</option>
                <option value="僱用獎助">僱用獎助</option>
                <option value="青年跨域就業津貼">青年跨域就業津貼</option>
                <option value="中高齡跨域就業津貼">中高齡跨域就業津貼</option>
            </select>
        </div>
    </div>

    <button class="btn-main" id="generate_btn">🚀 生成完整個案紀錄</button>

    <div id="resultArea">
        <button class="copy-btn" id="copy_btn">複製全部內容</button>
        <div id="resultContent"></div>
    </div>

    <datalist id="y_list"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option></datalist>
</div>

<script>
// 所有邏輯封裝在 DOMContentLoaded 確保網頁載入後才執行
document.addEventListener('DOMContentLoaded', function() {
    // 1. 初始化月份
    const mSelects = ['exp_m', 'idle_m'];
    mSelects.forEach(id => {
        const el = document.getElementById(id);
        if(el) {
            for(let i=0; i<=11; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = i + ' 個月';
                el.appendChild(opt);
            }
        }
    });

    // 2. 專案計畫動態欄位
    const planSelect = document.getElementById('plan_type');
    function updateTreatUI() {
        const val = planSelect.value;
        const area = document.getElementById('treatment_inputs');
        let h = "";
        if (val === "婦女再就業計畫") {
            h = `<label>離職原因</label><select id="t_reason"><option value="料理家務">料理家務</option><option value="照顧長輩">照顧長輩</option><option value="照顧子女">照顧子女</option></select>
                 <label>推介公司</label><input type="text" id="t_comp"><label>職務內容</label><input type="text" id="t_job">`;
        } else if (val === "弱勢勞工協助措施") {
            h = `<label>本日日期</label><input type="date" id="t_date">
                 <label>推介公司</label><input type="text" id="t_comp"><label>職務內容</label><input type="text" id="t_job">`;
        } else if (val === "外台青年職得好評") {
            h = `<label>外台人員</label><input type="text" id="t_ext" placeholder="xx台-xxx"><label>台中站輔導員</label><input type="text" id="t_tc">
                 <label>日期</label><input type="text" id="t_date_val" value="${new Date().toLocaleDateString()}">`;
        } else if (val === "就保跨域_一般") {
            h = `<label>案主身分</label><select id="t_id_type"><option value="為非自願離職者">為非自願離職者</option><option value="待業滿3個月以上">待業滿3個月以上</option></select>
                 <label>推介公司</label><input type="text" id="t_comp"><label>職務內容</label><input type="text" id="t_job">`;
        } else if (val.includes("卡")) {
            h = `<label>前次推介結果</label><input type="text" id="t_old_res">
                 <label>案主身分/方向</label><input type="text" id="t_iden" placeholder="例如：行政助理 / 中高齡者">
                 <label>本次公司</label><input type="text" id="t_comp"><label>應徵職務</label><input type="text" id="t_job">`;
        } else {
            h = `<label>推介公司</label><input type="text" id="t_comp"><label>職務內容</label><input type="text" id="t_job">`;
        }
        area.innerHTML = h;
    }
    planSelect.addEventListener('change', updateTreatUI);
    updateTreatUI();

    // 3. 家族史連動
    document.getElementsByName('family_status').forEach(r => r.addEventListener('change', () => {
        document.getElementById('family_detail_area').style.display = (r.value === '單身' ? 'none' : 'block');
    }));

    document.getElementById('adult_check_row').addEventListener('change', (e) => {
        if(e.target.type === 'checkbox') {
            const container = document.getElementById('member_job_list');
            const name = e.target.value;
            if(e.target.checked) {
                const div = document.createElement('div');
                div.id = `mem_row_${name}`;
                div.innerHTML = `<label>${name}背景</label><input type="text" class="mem-bg-input" data-name="${name}" data-order="1" data-sub="0" placeholder="背景角色">`;
                container.appendChild(div);
            } else {
                const target = document.getElementById(`mem_row_${name}`);
                if(target) target.remove();
            }
            sortFamilyInputs();
        }
    });

    const chnNum = ["", "大", "二", "三", "四", "五"];
    function syncChildren(type, countSelectId, order) {
        const count = parseInt(document.getElementById(countSelectId).value);
        const container = document.getElementById('member_job_list');
        // 清除舊的
        container.querySelectorAll(`.child-item[data-type="${type}"]`).forEach(el => el.remove());
        // 新增
        for(let i=1; i<=count; i++) {
            let name = (count > 1) ? (chnNum[i] + type) : type;
            const div = document.createElement('div');
            div.id = `mem_row_${name}`;
            div.className = 'child-item';
            div.setAttribute('data-type', type);
            div.innerHTML = `<label>${name}背景</label><input type="text" class="mem-bg-input" data-name="${name}" data-order="${order}" data-sub="${i}" placeholder="學業背景">`;
            container.appendChild(div);
        }
        sortFamilyInputs();
    }

    document.getElementById('son_count').addEventListener('change', () => syncChildren('兒子', 'son_count', 2));
    document.getElementById('daughter_count').addEventListener('change', () => syncChildren('女兒', 'daughter_count', 3));

    function sortFamilyInputs() {
        const container = document.getElementById('member_job_list');
        const items = Array.from(container.children);
        items.sort((a, b) => {
            const iA = a.querySelector('input');
            const iB = b.querySelector('input');
            if(iA.dataset.order !== iB.dataset.order) return iA.dataset.order - iB.dataset.order;
            return iA.dataset.sub - iB.dataset.sub;
        });
        items.forEach(el => container.appendChild(el));
    }

    document.getElementById('health_status').addEventListener('change', (e) => {
        document.getElementById('health_custom').style.display = (e.target.value === '有' ? 'block' : 'none');
    });

    // 4. 生成按鈕
    document.getElementById('generate_btn').onclick = function() {
        const getT = (yI, mI) => {
            let y = document.getElementById(yI).value, m = document.getElementById(mI).value, s = "";
            if (y && y !== "0") s += y + "年";
            if (m && m !== "0") s += m + "個月";
            return s;
        };
        const getC = (n, cId) => {
            let items = Array.from(document.querySelectorAll(`input[name="${n}"]:checked`)).map(i => i.value);
            let c = document.getElementById(cId)?.value.trim();
            if (c) items.push(c);
            return items.join('、');
        };

        // 家族
        let famText = "";
        if (document.querySelector('input[name="family_status"]:checked').value === '單身') {
            famText = "1.同住家庭成員:案主為單身自住。";
        } else {
            const inputs = Array.from(document.querySelectorAll('.mem-bg-input'));
            const names = inputs.map(i => i.dataset.name);
            const bgs = inputs.map(i => `${i.dataset.name}-${i.value || '無'}`);
            famText = `1.同住家庭成員:${names.join('及')}。\n2.${bgs.join('、')}。`;
        }

        // 教育
        const eduV = document.getElementById('edu_history').value.split(/[,，]/).filter(s => s.trim());
        let eduText = eduV.map((s, i) => `${i+1}.${s.trim()}。`).join('\n');

        // 其他
        const subs = Array.from(document.querySelectorAll('input[name="other_subs"]:checked')).map(i => i.value);
        const cpV = document.getElementById('other_plan').value;
        let oL = [];
        if (subs.length > 0) oL.push(`案主目前有${subs.join('、')}。`);
        if (cpV !== "無") oL.push(`案主目前有運用${cpV}求職找工作。`);
        if (oL.length === 0) oL.push(`案主目前無申請及運用任一補助及津貼。`);
        let otherText = "【其他】\n" + oL.map((l, i) => `${i+1}.${l}`).join('\n');

        // 處遇
        const pT = planSelect.value, comp = document.getElementById('t_comp')?.value || "XX公司", job = document.getElementById('t_job')?.value || "XX職務", idleT = getT('idle_y', 'idle_m');
        let treat = "【處遇及追蹤輔導情形】\n\n";

        if (pT === "婦女再就業計畫") {
            treat += `經諮詢後了解，案主過去因${document.getElementById('t_reason').value}的關係，導致待業已超過180天，現況求職阻礙已改善，本日經業務輔導員評估，案主符合婦女再就業獎勵計畫之媒合條件，故說明計畫內容，本日協助運用該計畫推介至${comp}的${job}職缺，已告知相關權益及回卡事宜。`;
        } else if (pT === "弱勢勞工協助措施") {
            const tD = document.getElementById('t_date').value || new Date().toLocaleDateString();
            treat += `案主於待業期間努力以行政、助理的工作求職 ，但因欠缺就業機會與求職管道資訊，而無法順利轉業及再就業，至今已待業超過${idleT}，經${tD}由職進行次求職服務時，了解案主求職能力及工作目標後，協助運用弱勢勞工就業協助措施以就業獎勵予以支持穩定案主就業，媒合${comp}的${job}職缺，並請案主於開卡後七日內回覆介紹結果回覆卡，以利追蹤求職概況。`;
        } else if (pT === "職學_一般" || pT === "僱獎_一般") {
            treat += `案主因欠缺就業機會與求職管道資訊，而無法順利轉業及再就業，至今已待業${idleT}${pT==='僱獎_一般'?'以上':''}，經本日由職進行第一次求職服務後，依案主求職能力及工作目標，${pT==='僱獎_一般'?'提供':'媒合'}${comp}的${job}，並請案主於開卡後七日內回覆介紹結果回覆卡，以利追蹤求職概況。`;
        } else if (pT === "就保跨域_一般" || pT === "初青跨域_一般") {
            let pre = pT.includes("就保") ? `案主本身${document.getElementById('t_id_type').value} 的求職者` : "案主為初次尋職者，畢業後";
            treat += `${pre}因欠缺就業機會與求職管道資訊，而無法順利${pT.includes("就保")?'轉業及再就業':'就業'}，至今已待業${idleT}以上，經本日由職進行第一次求職服務後，依案主求職能力及工作目標，提供${comp}的${job}，並請案主於開卡後七日內回覆介紹結果回覆卡，以利追蹤求職概況。`;
        } else if (pT.includes("卡")) {
            let pN = pT.includes("職學")?"職場學習及再適應計畫":pT.includes("僱獎")?"雇用獎助":pT.includes("就保")?"就保跨域推介":"初青跨域推介";
            let res = document.getElementById('t_old_res').value, iden = document.getElementById('t_iden').value;
            if(pT.includes("跨域")) {
                treat += `1.經本日由職進行第二次求職服務後，確認前次推介居住地轄區的工作機會結果為${res}。\n2.案主目前求職方向以${iden}為主，其前次推介居住地轄區工作未果，經本次服務案主表示有意願至外縣市就業，且案主符合${pN}之適用對象，故經求職者同意後，由本站運用就促工具進行媒合，協助推介至${comp}，應徵${job}。已告知相關權益及回卡事宜。`;
            } else {
                treat += `1.經本日由職進行第二次求職服務後，確認前次推介的結果為${res}。\n2.案主為${iden}，經推介一般職缺未能就業，職評估案主因工作能力薄弱，符合${pN}之適用對象，故求職者同意由本站運用就促工具進行媒合，協助推介至${comp}，應徵${job}。已告知相關權益及回卡事宜。`;
            }
        } else {
            treat += `案主因欠缺就業機會與求職管道資訊，至今已待業${idleT}，經本日進行求職服務後，協助推介至${comp}應徵${job}。`;
        }

        const out = `【家族史】\n${famText}\n\n【教育史】\n${eduText}\n\n【健康史】\n${document.getElementById('health_status').value==='無'?'個案自述無其他特殊的身心情況。':document.getElementById('health_custom').value}\n\n【經驗】\n案主具有${getT('exp_y', 'exp_m')}${document.getElementById('exp_job').value}經驗。\n\n【技巧(專長)】\n1.具備駕照：${getC('skill_lic', 'skill_lic_custom') || '無'}\n2.具備證照：${getC('skill_cert', 'skill_cert_custom') || '無'}\n3.具備工作職能：${getC('skill_fun', 'skill_fun_custom') || '無'}\n\n【興趣】\n${document.getElementById('interest').value || '沒有明確的興趣喜好'}。\n\n【工作目標】\n1.工作類型:${document.getElementById('target_job').value}\n2.工作地點/交通時間:${document.getElementById('target_loc').value}，交通時間約${document.getElementById('target_commute').value}分鐘內為佳\n3.希望待遇:${document.getElementById('target_salary').value}${document.getElementById('target_salary').value?'元':''}\n4.工作時間:${getC('target_shift', 'target_shift_custom')}\n\n【問題主述】\n案主至今已待業${idleT}，主因欠缺就業機會與求職管道資訊，以致無法順業及再就業。\n\n${otherText}\n\n${treat}`;

        document.getElementById('resultContent').innerText = out;
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    };

    document.getElementById('copy_btn').onclick = function() {
        navigator.clipboard.writeText(document.getElementById('resultContent').innerText);
        alert("內容已成功複製！");
    };
});
</script>
</body>
</html>
