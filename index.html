<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個案管理紀錄智慧生成器</title>
    <style>
        :root {
            --bg-color: #f2f0eb; 
            --card-bg: #fafaf8;
            --text-main: #3d3b38;
            --accent: #7a6e5d;
            --border: #d6d0c6;
            --input-focus: #a89d8d;
            --font-size: 1.2rem;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 30px 20px; margin: 0; line-height: 1.8; font-size: var(--font-size); }
        .container { max-width: 1000px; margin: 0 auto; }
        .section { background: var(--card-bg); padding: 35px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid var(--border); }
        h2 { font-size: 1.5rem; color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-top: 0; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 700; margin-bottom: 10px; color: #5a5752; }
        input[type="text"], select, textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1.15rem; background: #fff; box-sizing: border-box; color: var(--text-main); }
        input:focus { border-color: var(--input-focus); outline: none; box-shadow: 0 0 0 3px rgba(168, 157, 141, 0.2); }
        details { background: #fff; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
        summary { padding: 12px 15px; font-weight: bold; cursor: pointer; background: #efece7; border-radius: 10px; list-style: none; display: flex; justify-content: space-between; }
        summary::after { content: "▼"; font-size: 0.8rem; }
        details[open] summary::after { content: "▲"; }
        .choice-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding: 15px; }
        .choice-item { display: flex; align-items: center; cursor: pointer; font-size: 1.1rem; }
        .choice-item input { width: 22px; height: 22px; margin-right: 10px; }
        #dynamic-treatment-area { background: #fdfaf5; border: 2px solid #e2dcd3; padding: 25px; border-radius: 15px; margin-top: 15px; }
        .btn-main { display: block; width: 100%; background: var(--accent); color: white; border: none; padding: 18px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.3s; margin: 40px 0; }
        .btn-main:hover { background: #63584a; transform: translateY(-2px); }
        #resultArea { display: none; background: #fff; border: 3px solid var(--accent); padding: 40px; border-radius: 20px; white-space: pre-wrap; font-size: 1.25rem; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .copy-btn { position: absolute; top: 15px; right: 15px; padding: 10px 20px; background: #8e8e8e; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .row { display: flex; gap: 15px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--accent); font-size: 2.2rem; margin-bottom: 40px;">個案管理紀錄智慧生成系統</h1>

    <div class="section" style="border: 2px solid var(--accent);">
        <h2>◆ 步驟 1：選擇專案計畫</h2>
        <div class="form-group">
            <label>專案計畫分類</label>
            <select id="plan_type" onchange="updateDynamicArea()">
                <option value="婦女再就業計畫">婦女再就業計畫</option>
                <option value="弱勢勞工協助措施">弱勢勞工協助措施</option>
                <option value="青年職得好評計畫">青年職得好評計畫</option>
                <option value="外台青年職得好評">外台推介青年職得好評計畫</option>
                <option value="缺工">缺工就業獎勵</option>
                <option value="職學_一般">職學 (一般推介)</option>
                <option value="職學_卡">職學 (開介紹卡)</option>
                <option value="僱獎_一般">僱獎 (一般推介)</option>
                <option value="僱獎_卡">僱獎 (開介紹卡)</option>
                <option value="就保跨域_一般">就保跨域 (一般推介)</option>
                <option value="就保跨域_卡">就保跨域 (開介紹卡)</option>
                <option value="初青跨域_一般">初青跨域 (一般推介)</option>
                <option value="初青跨域_卡">初青跨域 (開介紹卡)</option>
            </select>
        </div>
        <div id="dynamic-treatment-area">
            <div id="treatment_inputs"></div>
        </div>
    </div>

    <div class="section">
        <h2>◆ 步驟 2：背景資料</h2>
        <div class="form-group">
            <label>家族史狀況</label>
            <div class="row" style="background:#efece7; padding:15px; border-radius:12px;">
                <label class="choice-item"><input type="radio" name="family_status" value="單身" onclick="toggleFamily(true)"> 單身自住</label>
                <label class="choice-item"><input type="radio" name="family_status" value="同住" checked onclick="toggleFamily(false)"> 有同住家庭成員</label>
            </div>
            <div id="family_detail_area" style="margin-top: 20px;">
                <label>選擇成員 (可複選)</label>
                <div class="row" style="flex-wrap: wrap; gap: 10px;">
                    <label class="choice-item"><input type="checkbox" value="配偶" onchange="toggleMember('配偶')">配偶</label>
                    <label class="choice-item"><input type="checkbox" value="爸爸" onchange="toggleMember('爸爸')">爸爸</label>
                    <label class="choice-item"><input type="checkbox" value="媽媽" onchange="toggleMember('媽媽')">媽媽</label>
                    <label class="choice-item"><input type="checkbox" value="兒子" onchange="toggleMember('兒子')">兒子</label>
                    <label class="choice-item"><input type="checkbox" value="女兒" onchange="toggleMember('女兒')">女兒</label>
                </div>
                <div id="member_job_list" style="margin-top:15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            </div>
        </div>
        <div class="form-group">
            <label>教育史 (多所學校請以 , 分開)</label>
            <input type="text" id="edu_history" placeholder="例如：大學-台大電機畢業, 碩士-彰師大心理畢業">
        </div>
        <div class="grid">
            <div class="form-group">
                <label>健康史</label>
                <select id="health_status" onchange="document.getElementById('health_custom').style.display=(this.value==='有'?'block':'none')">
                    <option value="無">無狀況 (自述無特殊身心情況)</option>
                    <option value="有">有狀況 (自填)</option>
                </select>
                <input type="text" id="health_custom" style="display:none; margin-top:10px;" placeholder="病名或障別">
            </div>
            <div class="form-group"><label>興趣</label><input type="text" id="interest" placeholder="留空則顯示：沒有明確的興趣喜好"></div>
        </div>
        <div class="grid">
            <div class="form-group"><label>經驗職稱</label><input type="text" id="exp_job" placeholder="例如：餐廳外場服務員"></div>
            <div class="form-group"><label>累計資歷</label>
                <div class="row"><input type="text" id="exp_y" placeholder="年" list="y_list" style="width:80px;"><select id="exp_m"></select></div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>◆ 步驟 3：技巧(專長) 與 工作職能</h2>
        <div class="form-group">
            <label>1. 具備駕照</label>
            <div class="row" style="background:#efece7; padding:15px; border-radius:12px;">
                <label class="choice-item"><input type="checkbox" name="skill_lic" value="重型機車駕照">重型機車</label>
                <label class="choice-item"><input type="checkbox" name="skill_lic" value="普通小型車駕照">普通小型車</label>
                <input type="text" id="skill_lic_custom" placeholder="其他自填" style="width:200px;">
            </div>
        </div>
        <label>2. 具備證照</label>
        <details><summary>照顧醫療相關</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="照顧服務員單一級技術士技能檢定">照顧服務員單一級</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="長期照顧服務人員證明">長期照顧服務人員證明</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="居家服務員訓練結業證明">居家服務員訓練結業</label>
        </div></details>
        <details><summary>行政電腦相關</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="TQC電腦證照">TQC電腦證照</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="MOS（Word / Excel / PowerPoint）">MOS（Word / Excel / PowerPoint）</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級電腦軟體應用技術士">丙級電腦軟體應用</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級電腦軟體應用技術士">乙級電腦軟體應用</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="中文輸入">中文輸入</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="英文輸入">英文輸入</label>
        </div></details>
        <details><summary>商業會計相關</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級會計事務技術士">丙級會計事務</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級會計事務技術士">乙級會計事務</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="記帳士">記帳士</label>
        </div></details>
        <details><summary>餐飲食品相關</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級中餐烹調技術士">丙級中餐烹調</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級中餐烹調技術士">乙級中餐烹調</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級烘焙技術士">丙級烘焙技術</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級烘焙技術士">乙級烘焙技術</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="食品衛生安全講習證明">食品衛生安全講習</label>
        </div></details>
        <details><summary>技術勞務類</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="乙級職業安全衛生管理員">乙級職安管理員</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級工業配線技術士">丙級工業配線</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="丙級電腦硬體裝修技術士">丙級電腦硬體裝修</label>
            <label class="choice-item"><input type="checkbox" name="skill_cert" value="堆高機操作證">堆高機操作證</label>
        </div></details>
        <input type="text" id="skill_cert_custom" placeholder="其他證照自填" style="margin-bottom:20px;">
        <label>3. 具備工作職能</label>
        <details><summary>行政文書相關</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="電腦文書處理能力">電腦文書處理</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="資料輸入與建檔能力">資料輸入建檔</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="文件整理與歸檔">文件整理歸檔</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="基本文書處理（Word、Excel）">基本文書（Word、Excel）</label>
        </div></details>
        <details><summary>行政進階</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="行政事務處理能力">行政事務處理</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="櫃檯接待與應對能力">櫃檯接待應對</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="電話應對與溝通能力">電話應對溝通</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="行程安排與協調能力">行程安排協調</label>
        </div></details>
        <details><summary>服務業</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="顧客服務接待能力">顧客服務接待</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="客訴處理能力">客訴處理能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="門市銷售與商品介紹">門市銷售介紹</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="收銀操作能力">收銀操作能力</label>
        </div></details>
        <details><summary>商業會計</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="基本會計帳務處理">基本會計帳務</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="發票開立與核對">發票開立核對</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="收支管理">收支管理</label>
        </div></details>
        <details><summary>勞務作業</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="體力勞動工作能力">體力勞動能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="簡易機械操作能力">簡易機械操作</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="包裝作業能力">包裝作業能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="倉儲整理能力">倉儲整理能力</label>
        </div></details>
        <details><summary>照顧服務</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="生活照顧服務能力">生活照顧服務</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="長者照護能力">長者照護能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="基本醫療照護協助">基本醫療照護協助</label>
        </div></details>
        <details><summary>軟實力</summary><div class="choice-group">
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="具備良好溝通能力">良好溝通能力</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="工作態度積極負責">態度積極負責</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="配合度高">配合度高</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="抗壓性佳">抗壓性佳</label>
            <label class="choice-item"><input type="checkbox" name="skill_fun" value="願意學習新技能">願意學習新技能</label>
        </div></details>
        <input type="text" id="skill_fun_custom" placeholder="其他職能自填">
    </div>

    <div class="section">
        <h2>◆ 步驟 4：工作目標與問題</h2>
        <div class="grid">
            <div class="form-group"><label>1. 工作類型</label><input type="text" id="target_job"></div>
            <div class="form-group"><label>2. 工作地點</label><input type="text" id="target_loc"></div>
            <div class="form-group"><label>3. 交通時間 (分)</label><input type="text" id="target_commute"></div>
            <div class="form-group"><label>4. 希望待遇</label><input type="text" id="target_salary" placeholder="輸入數字即可"></div>
        </div>
        <div class="form-group">
            <label>5. 工作時間</label>
            <div class="row" style="background:#efece7; padding:15px; border-radius:12px;">
                <label class="choice-item"><input type="checkbox" name="target_shift" value="日班" checked>日班</label>
                <label class="choice-item"><input type="checkbox" name="target_shift" value="中班">中班</label>
                <label class="choice-item"><input type="checkbox" name="target_shift" value="晚班">晚班</label>
                <label class="choice-item"><input type="checkbox" name="target_shift" value="可輪班">可輪班</label>
                <input type="text" id="target_shift_custom" placeholder="自填" style="width:150px;">
            </div>
        </div>
        <div class="form-group"><label>待業時間 (本次)</label>
            <div class="row"><input type="text" id="idle_y" placeholder="年" list="y_list" style="width:100px;"><select id="idle_m"></select></div>
        </div>
    </div>

    <div class="section">
        <h2>◆ 步驟 5：其他補助與目前計畫</h2>
        <div class="form-group">
            <label>申請補助狀況</label>
            <div class="row" style="flex-wrap: wrap; gap:10px;">
                <label class="choice-item"><input type="checkbox" name="other_subs" value="申請失業給付">申請失業給付</label>
                <label class="choice-item"><input type="checkbox" name="other_subs" value="弱勢勞工生活扶助">弱勢勞工生活扶助</label>
            </div>
        </div>
        <div class="form-group">
            <label>目前運用求職計畫</label>
            <select id="other_plan">
                <option value="無">無</option>
                <option value="婦女再就業計畫">婦女再就業計畫</option>
                <option value="弱勢勞工協助措施">弱勢勞工協助措施</option>
                <option value="青年職得好評計畫">青年職得好評計畫</option>
                <option value="缺工就業獎勵">缺工就業獎勵</option>
                <option value="職場學習及再適應計畫">職場學習及再適應計畫</option>
                <option value="僱用獎助">僱用獎助</option>
                <option value="青年跨域就業津貼">青年跨域就業津貼</option>
                <option value="中高齡跨域就業津貼">中高齡跨域就業津貼</option>
            </select>
        </div>
    </div>

    <button class="btn-main" onclick="generate()">🚀 生成個案紀錄</button>

    <div id="resultArea">
        <button class="copy-btn" onclick="copyText()">複製文字</button>
        <div id="resultContent"></div>
    </div>

    <datalist id="y_list"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option></datalist>
</div>

<script>
    // 初始化月份選單
    const mSelects = ['exp_m', 'idle_m'];
    mSelects.forEach(id => {
        const el = document.getElementById(id);
        for(let i=0; i<=11; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = i + ' 個月';
            el.appendChild(opt);
        }
    });

    function toggleFamily(isSingle) {
        document.getElementById('family_detail_area').style.display = isSingle ? 'none' : 'block';
    }

    function toggleMember(name) {
        const container = document.getElementById('member_job_list');
        const id = `mem_${name}`;
        if (document.getElementById(id)) { document.getElementById(id).remove(); }
        else {
            const div = document.createElement('div');
            div.id = id;
            div.innerHTML = `<label>${name}背景</label><input type="text" class="mem-bg" data-mem="${name}" placeholder="如：營造業-工地主任">`;
            container.appendChild(div);
        }
    }

    function updateDynamicArea() {
        const plan = document.getElementById('plan_type').value;
        const area = document.getElementById('treatment_inputs');
        let h = "";
        if (plan === "婦女再就業計畫") {
            h = `<label>離職原因</label><select id="t_reason"><option value="料理家務">料理家務</option><option value="照顧長輩">照顧長輩</option><option value="照顧子女">照顧子女</option></select>
                 <label>推介公司</label><input type="text" id="t_comp">
                 <label>職務內容</label><input type="text" id="t_job">`;
        } else if (plan === "外台青年職得好評") {
            h = `<label>外台人員</label><input type="text" id="t_ext" placeholder="xx台-xxx">
                 <label>台中站輔導員</label><input type="text" id="t_tc">
                 <label>日期</label><input type="text" id="t_date" value="${new Date().toLocaleDateString()}">`;
        } else if (plan.includes("卡")) {
            h = `<label>前次推介結果</label><input type="text" id="t_old_res">
                 <label>身分別</label><input type="text" id="t_iden">
                 <label>本次推介公司</label><input type="text" id="t_comp">
                 <label>應徵職務</label><input type="text" id="t_job">`;
        } else {
            h = `<label>推介公司</label><input type="text" id="t_comp">
                 <label>職務內容</label><input type="text" id="t_job">`;
        }
        area.innerHTML = h;
    }
    updateDynamicArea();

    function formatTime(y, m) {
        let s = "";
        if (y && y !== "0") s += y + "年";
        if (m && m !== "0") s += m + "個月";
        return s;
    }

    function getCombined(name, customId) {
        let items = Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(c => c.value);
        let c = document.getElementById(customId)?.value.trim();
        if (c) items.push(c);
        return items.join('、');
    }

    function generate() {
        try {
            let fam = "";
            if (document.querySelector('input[name="family_status"]:checked').value === '單身') {
                fam = "1.同住家庭成員:案主為單身自住。";
            } else {
                const mems = Array.from(document.querySelectorAll('#family_detail_area input[type="checkbox"]:checked')).map(c => c.value);
                const bgs = Array.from(document.querySelectorAll('.mem-bg')).map(i => `${i.getAttribute('data-mem')}-${i.value}`);
                fam = `1.同住家庭成員:${mems.join('及')}。\n2.${bgs.join('、')}。`;
            }

            const eduVal = document.getElementById('edu_history').value;
            const eduArray = eduVal.split(/[,，]/).filter(s => s.trim() !== "");
            let eduText = eduArray.map((s, i) => `${i+1}.${s.trim()}。`).join('\n');

            const plan = document.getElementById('plan_type').value;
            const comp = document.getElementById('t_comp')?.value || "";
            const job = document.getElementById('t_job')?.value || "";
            const idleT = formatTime(document.getElementById('idle_y').value, document.getElementById('idle_m').value);
            let treat = "【處遇及追蹤輔導情形】\n\n";

            if (plan === "婦女再就業計畫") {
                treat += `經諮詢後了解，案主過去因${document.getElementById('t_reason').value}的關係，導致待業已超過180天，現況求職阻礙已改善，本日經業務輔導員評估，案主符合婦女再就業獎勵計畫之媒合條件，故說明計畫內容，本日協助運用該計畫推介至${comp}的${job}職缺，已告知相關權益及回卡事宜。`;
            } else if (plan === "青年職得好評計畫") {
                treat += `1.案主待業已超過180天，初步諮詢青年面臨求職困難。\n2.本日經業務輔導員評估，案主符合青年職得好評計畫之參與資格，且有深度就業諮詢需求，故本日協助辦理該計畫資格審核，後續完成深度就業諮詢後，將持續追蹤、提供求職服務。`;
            } else if (plan === "外台青年職得好評") {
                treat += `1.案主待業已超過6個月以上，初步諮詢青年面臨求職困難。\n2.本日經${document.getElementById('t_ext').value}業務輔導員評估，案主符合青年職得好評計畫之參與資格，且有深度諮詢需求，故協助辦理該計畫資格審核。\n3.礙於鄉鎮台沒有開立管理權限，於${document.getElementById('t_date').value}經臺中站${document.getElementById('t_tc').value}業務員開案，並持續追蹤服務。`;
            } else if (plan.includes("卡")) {
                treat += `1.經本日由職進行第二次求職服務後，確認前次推介的結果為${document.getElementById('t_old_res').value}。\n2.案主為${document.getElementById('t_iden').value}，經推介一般職缺未能就業，評估符合計畫適用對象，故協助推介至${comp}，應徵${job}。`;
            } else {
                treat += `案主因欠缺求職管道資訊，至今已待業${idleT}，經本日進行求職服務後，依案主工作目標，媒合${comp}的${job}，並請回覆介紹卡以利追蹤。`;
            }

            const checkedSubs = Array.from(document.querySelectorAll('input[name="other_subs"]:checked')).map(c => c.value);
            const curPlan = document.getElementById('other_plan').value;
            let otherLines = [];
            if (checkedSubs.length > 0) otherLines.push(`案主目前有${checkedSubs.join('、')}。`);
            if (curPlan !== "無") otherLines.push(`案主目前有運用${curPlan}求職找工作。`);
            if (checkedSubs.length === 0 && curPlan === "無") otherLines.push(`案主目前無申請及運用任一補助及津貼。`);
            let otherText = "【其他】\n" + otherLines.map((l, i) => `${i+1}.${l}`).join('\n');

            let out = `【家族史】\n${fam}\n\n【教育史】\n${eduText}\n\n【健康史】\n${document.getElementById('health_status').value==='無'?'個案自述無其他特殊的身心情況。':document.getElementById('health_custom').value}\n\n【經驗】\n案主具有${formatTime(document.getElementById('exp_y').value, document.getElementById('exp_m').value)}${document.getElementById('exp_job').value}經驗。\n\n【技巧(專長)】\n1.具備駕照：${getCombined('skill_lic', 'skill_lic_custom') || '無'}\n2.具備證照：${getCombined('skill_cert', 'skill_cert_custom') || '無'}\n3.具備工作職能：${getCombined('skill_fun', 'skill_fun_custom') || '無'}\n\n【興趣】\n${document.getElementById('interest').value || '沒有明確的興趣喜好'}。\n\n【工作目標】\n1.工作類型:${document.getElementById('target_job').value}\n2.工作地點/交通時間:${document.getElementById('target_loc').value}，交通時間約${document.getElementById('target_commute').value}分鐘內為佳\n3.希望待遇:${document.getElementById('target_salary').value}${document.getElementById('target_salary').value?'元':''}\n4.工作時間:${getCombined('target_shift', 'target_shift_custom')}\n\n【問題主述】\n案主至今已待業${idleT}，主因欠缺就業機會與求職管道資訊，以致無法順業及再就業。\n\n${otherText}\n\n${treat}`;

            document.getElementById('resultContent').innerText = out;
            document.getElementById('resultArea').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } catch (e) {
            console.error(e);
            alert("生成錯誤，請確認所有欄位。");
        }
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('resultContent').innerText);
        alert("複製成功！");
    }
</script>
</body>
</html>
